name: Auto Build EssentialsX Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'plugin.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 手动触发

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Get commit hash
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package
        
      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "*-obfuscated.jar" -type f | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "No obfuscated JAR file found in target/" >&2
            exit 1
          fi
          RELEASE_JAR="target/EssentialsX.1.21.jar"
          mv "$JAR_FILE" "$RELEASE_JAR"
          echo "jar_file=$RELEASE_JAR" >> $GITHUB_OUTPUT
          echo "Found obfuscated JAR file: $JAR_FILE"
          echo "Renamed release JAR file: $RELEASE_JAR"
          
      - name: Create Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            ## Download
            Download the JAR file below and place it in your server's `plugins` folder.
            
            ## Automatic Updates
            This release is automatically updated on every push to the main branch.
            The `latest` tag will always point to the most recent build.
            
          files: ${{ steps.jar-name.outputs.jar_file }}
          make_latest: true
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: essentialsx-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 60
